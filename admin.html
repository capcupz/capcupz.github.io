<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup Admin · Premium Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #141a2e 50%, #0f1625 100%);
      color: #f1f5f9;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }
    
    :root {
      --primary: #3b82f6;
      --primary-light: #60a5fa;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0a0e1a;
      --card-bg: rgba(255, 255, 255, 0.03);
    }
    
    /* Admin Header */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 2.5rem;
    }
    
    .admin-logo {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    
    .admin-badge {
      background: rgba(59, 130, 246, 0.15);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-light);
      border: 1px solid rgba(59, 130, 246, 0.3);
      margin-left: 1rem;
    }
    
    .btn {
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    
    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      color: white;
    }
    
    .btn-danger {
      background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
      color: white;
    }
    
    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
    }
    
    /* Login Panel */
    .login-panel {
      max-width: 440px;
      margin: 120px auto;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      padding: 3rem 2.5rem;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    }
    
    .login-panel h2 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
      font-weight: 700;
    }
    
    .input-field {
      width: 100%;
      padding: 1.1rem 1.3rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      margin: 1.2rem 0;
      transition: all 0.3s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    
    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    /* Admin Cards */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 2.5rem;
    }
    
    .admin-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 2.2rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }
    
    .admin-card h2 {
      margin-bottom: 2rem;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    
    .card-header-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    
    .count-badge {
      background: var(--primary);
      padding: 0.3rem 1rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 700;
    }
    
    .count-badge.warning {
      background: var(--warning);
    }
    
    .request-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s;
    }
    
    .request-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }
    
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    
    .request-name {
      font-weight: 700;
      font-size: 1.15rem;
    }
    
    .request-email {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }
    
    .request-detail {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .action-buttons {
      display: flex;
      gap: 1rem;
    }
    
    .action-buttons .btn {
      flex: 1;
      padding: 0.7rem 1rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3.5rem 2rem;
      color: rgba(255, 255, 255, 0.35);
      font-size: 1.1rem;
    }
    
    .back-link {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    
    .back-link:hover {
      color: white;
    }
    
    @media (max-width: 640px) {
      .container { padding: 1.5rem; }
      .admin-grid { grid-template-columns: 1fr; }
      .login-panel { padding: 2rem 1.5rem; margin: 60px auto; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Login Panel -->
  <div id="loginPanel">
    <div class="login-panel">
      <h2>🔐 Admin Access</h2>
      <input type="password" id="adminPassword" class="input-field" placeholder="Enter admin password">
      <button class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" onclick="loginAdmin()">Access Control Panel</button>
      <p id="loginError" style="color: var(--danger); margin-top: 1.2rem; text-align: center;"></p>
      <p style="text-align: center; margin-top: 2.5rem;">
        <a href="index.html" class="back-link">← Back to Website</a>
      </p>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="adminDashboard" style="display: none;">
    <div class="admin-header">
      <div style="display: flex; align-items: center;">
        <span class="admin-logo">CapCup Admin</span>
        <span class="admin-badge">Premium Control</span>
      </div>
      <div style="display: flex; gap: 1rem;">
        <button class="btn btn-outline" onclick="refreshData()">⟳ Refresh Data</button>
        <button class="btn btn-danger" onclick="logoutAdmin()">Sign Out</button>
      </div>
    </div>

    <div class="admin-grid">
      <!-- Pending Registrations -->
      <div class="admin-card">
        <div class="card-header-flex">
          <h2>
            <span>⏳</span> Pending Registrations
          </h2>
          <span class="count-badge" id="regCount">0</span>
        </div>
        <div id="pendingRegistrations"></div>
      </div>

      <!-- Pending Recharges -->
      <div class="admin-card">
        <div class="card-header-flex">
          <h2>
            <span>💳</span> Monthly Recharges
          </h2>
          <span class="count-badge warning" id="rechargeCount">0</span>
        </div>
        <div id="pendingRecharges"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGJ356zyjDyZmB6NqNBe5rnjStygfoCUVW6tQfK_CCLJob8zBBzzxAuY5V8U9Grw6SgQ/exec';
  const ADMIN_PASSWORD = 'capcup123';
  
  let isAdminLoggedIn = false;

  // Check if already logged in
  if(sessionStorage.getItem('adminLoggedIn') === 'true') {
    showDashboard();
  }

  function loginAdmin() {
    const password = document.getElementById('adminPassword').value;
    
    if(password === ADMIN_PASSWORD) {
      isAdminLoggedIn = true;
      sessionStorage.setItem('adminLoggedIn', 'true');
      showDashboard();
    } else {
      document.getElementById('loginError').innerText = 'Invalid password';
    }
  }

  function showDashboard() {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    refreshData();
  }

  function logoutAdmin() {
    isAdminLoggedIn = false;
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('adminDashboard').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  async function callAppsScript(action, params = {}) {
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...params })
      });
      
      if (response.ok) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch(e) {
          return { success: true };
        }
      }
      return { success: false };
    } catch (error) {
      console.error('API Error:', error);
      return { success: false };
    }
  }

  async function refreshData() {
    const res = await callAppsScript('adminGetPending');
    
    // Update registrations
    const regDiv = document.getElementById('pendingRegistrations');
    const regCount = document.getElementById('regCount');
    
    if(res.pendingReg && res.pendingReg.length > 0) {
      regCount.innerText = res.pendingReg.length;
      regDiv.innerHTML = res.pendingReg.map(user => `
        <div class="request-item">
          <div class="request-header">
            <span class="request-name">${user.name}</span>
            <span class="request-email">${user.email}</span>
          </div>
          <div class="request-detail">
            Transaction ID: ${user.trxId}
          </div>
          <div class="action-buttons">
            <button class="btn btn-success" onclick="approveUser('${user.email}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="declineUser('${user.email}')">✗ Decline</button>
          </div>
        </div>
      `).join('');
    } else {
      regCount.innerText = '0';
      regDiv.innerHTML = '<div class="empty-state">No pending registrations</div>';
    }
    
    // Update recharges
    const recDiv = document.getElementById('pendingRecharges');
    const recCount = document.getElementById('rechargeCount');
    
    if(res.pendingRec && res.pendingRec.length > 0) {
      recCount.innerText = res.pendingRec.length;
      recDiv.innerHTML = res.pendingRec.map(recharge => `
        <div class="request-item">
          <div class="request-header">
            <span class="request-name">${recharge.email}</span>
          </div>
          <div class="request-detail">
            Transaction ID: ${recharge.trxId}
          </div>
          <div class="action-buttons">
            <button class="btn btn-success" onclick="approveRecharge('${recharge.trxId}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="declineRecharge('${recharge.trxId}')">✗ Decline</button>
          </div>
        </div>
      `).join('');
    } else {
      recCount.innerText = '0';
      recDiv.innerHTML = '<div class="empty-state">No pending recharges</div>';
    }
  }

  async function approveUser(email) {
    await callAppsScript('approveUser', { email });
    refreshData();
  }

  async function declineUser(email) {
    await callAppsScript('declineUser', { email });
    refreshData();
  }

  async function approveRecharge(trxId) {
    await callAppsScript('approveRecharge', { trxId });
    refreshData();
  }

  async function declineRecharge(trxId) {
    await callAppsScript('declineRecharge', { trxId });
    refreshData();
  }

  // Expose functions
  window.loginAdmin = loginAdmin;
  window.logoutAdmin = logoutAdmin;
  window.refreshData = refreshData;
  window.approveUser = approveUser;
  window.declineUser = declineUser;
  window.approveRecharge = approveRecharge;
  window.declineRecharge = declineRecharge;
</script>
</body>
  </html>
