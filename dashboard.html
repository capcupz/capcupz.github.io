<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup - My Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      color: #1e293b;
    }
    
    .container {
      max-width: 550px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      margin-bottom: 20px;
    }
    
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #1e3a5f, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
      transition: all 0.3s;
    }
    
    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
    }
    
    /* Login Screen */
    #loginScreen {
      background: white;
      padding: 45px 35px;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }
    
    .login-title {
      font-size: 32px;
      font-weight: 800;
      color: #1e3a5f;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      color: #64748b;
      margin-bottom: 35px;
      font-size: 15px;
    }
    
    .form-group {
      margin-bottom: 22px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1e3a5f;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #1e3a5f, #3b82f6);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
      transition: all 0.3s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
    }
    
    /* Dashboard Screen */
    #dashboardScreen {
      display: none;
    }
    
    /* ===== UNIQUE 4D ANIMATED CARD ===== */
    .card-container {
      perspective: 1500px;
      margin-bottom: 24px;
    }
    
    .card-3d {
      transform-style: preserve-3d;
      animation: cardFloat 6s ease-in-out infinite;
    }
    
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
      25% { transform: translateY(-12px) rotateX(1.5deg) rotateY(4deg); }
      50% { transform: translateY(-4px) rotateX(-1.5deg) rotateY(-2deg); }
      75% { transform: translateY(-16px) rotateX(2.5deg) rotateY(6deg); }
    }
    
    .card {
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      border-radius: 32px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 0 40px rgba(59, 130, 246, 0.3);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(255, 255, 255, 0.04) 50%,
        transparent 70%
      );
      animation: hologram 8s linear infinite;
    }
    
    @keyframes hologram {
      0% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(0deg); }
    }
    
    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        125deg,
        transparent 0%,
        rgba(255, 255, 255, 0.06) 45%,
        rgba(255, 255, 255, 0.15) 50%,
        rgba(255, 255, 255, 0.06) 55%,
        transparent 100%
      );
      background-size: 250% 250%;
      animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    /* Card Orbs */
    .card-orb {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      filter: blur(45px);
      opacity: 0.4;
      z-index: 1;
    }
    
    .orb-1 {
      background: #3b82f6;
      top: -40px;
      right: -40px;
      animation: orbFloat1 5s ease-in-out infinite;
    }
    
    .orb-2 {
      background: #8b5cf6;
      bottom: -50px;
      left: -50px;
      animation: orbFloat2 7s ease-in-out infinite;
    }
    
    .orb-3 {
      background: #ec4899;
      width: 100px;
      height: 100px;
      bottom: 15%;
      right: 5%;
      animation: orbFloat3 4s ease-in-out infinite;
    }
    
    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(35px, -35px) scale(1.15); }
      66% { transform: translate(-25px, 25px) scale(0.9); }
    }
    
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-45px, 35px) scale(1.2); }
      66% { transform: translate(25px, -25px) scale(0.85); }
    }
    
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(-35px, -45px) scale(1.4); opacity: 0.5; }
    }
    
    .card-brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
    }
    
    .brand-name {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    
    .card-status-badge {
      padding: 6px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
    }
    
    .status-active {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.4);
    }
    
    .status-expired {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.4);
    }
    
    .status-pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.4);
    }
    
    .chip-container {
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
    }
    
    .chip {
      width: 60px;
      height: 48px;
      background: linear-gradient(145deg, #ffd700, #fbbf24, #d97706);
      border-radius: 12px;
      position: relative;
      box-shadow: 
        0 4px 10px rgba(0,0,0,0.4),
        inset 0 2px 6px rgba(255,255,255,0.5);
      transform: perspective(100px) rotateX(2deg);
    }
    
    .chip::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 6px;
    }
    
    .chip::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 20%;
      right: 20%;
      height: 2px;
      background: rgba(255,255,255,0.5);
    }
    
    .card-number {
      font-size: 26px;
      letter-spacing: 5px;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 28px;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
      word-spacing: 6px;
    }
    
    .card-details {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }
    
    .detail-group {
      display: flex;
      flex-direction: column;
    }
    
    .detail-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    
    .detail-value {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Credits Display */
    .credits-box {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(22, 163, 74, 0.15));
      backdrop-filter: blur(10px);
      padding: 18px 22px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(74, 222, 128, 0.3);
      position: relative;
      z-index: 2;
    }
    
    .credits-box.expired {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(220, 38, 38, 0.15));
      border: 1px solid rgba(248, 113, 113, 0.3);
    }
    
    .credits-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
    }
    
    .credits-amount {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .expired .credits-amount {
      background: linear-gradient(135deg, #f87171, #ef4444);
      -webkit-background-clip: text;
    }
    
    .contactless-icon {
      position: absolute;
      bottom: 25px;
      right: 25px;
      opacity: 0.4;
      z-index: 2;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.15); }
    }
    
    /* Action Buttons */
    .actions {
      background: white;
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }
    
    .action-btn {
      width: 100%;
      padding: 18px 22px;
      background: #f8fafc;
      color: #1e3a5f;
      border: 2px solid #e2e8f0;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 14px;
      transition: all 0.3s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .action-btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
      transform: translateX(5px);
    }
    
    .action-btn.primary {
      background: linear-gradient(135deg, #1e3a5f, #3b82f6);
      color: white;
      border: none;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }
    
    .action-btn.primary:hover {
      transform: translateY(-2px) translateX(0);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
    }
    
    .btn-icon {
      font-size: 24px;
    }
    
    .hidden-form {
      background: #f8fafc;
      border-radius: 20px;
      padding: 22px;
      margin-top: 15px;
      display: none;
      border: 2px solid #e2e8f0;
    }
    
    .hidden-form h4 {
      color: #1e3a5f;
      margin-bottom: 18px;
      font-size: 18px;
      font-weight: 700;
    }
    
    select {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      margin-bottom: 18px;
      font-size: 15px;
    }
    
    .message {
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }
    
    .message.success {
      background: #dcfce7;
      border: 2px solid #22c55e;
      color: #166534;
      display: block;
    }
    
    .message.error {
      background: #fee2e2;
      border: 2px solid #ef4444;
      color: #991b1b;
      display: block;
    }
    
    .payment-box {
      background: linear-gradient(135deg, #f0f9ff, #e0e7ff);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      border: 2px solid rgba(59, 130, 246, 0.2);
    }
    
    .payment-number {
      font-size: 26px;
      font-weight: 800;
      color: #1e3a5f;
      margin: 10px 0;
      letter-spacing: 2px;
    }
    
    .back-link {
      text-align: center;
      margin-top: 22px;
    }
    
    .back-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Screen -->
    <div id="loginScreen">
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Login to access your CapCup dashboard</p>
      
      <div id="loginMessage" class="message"></div>
      
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="loginPhone" placeholder="017XXXXXXXX">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      
      <button class="btn" onclick="doLogin()">Login to Dashboard</button>
      
      <p class="back-link">
        <a href="index.html">← Back to Registration</a>
      </p>
    </div>
    
    <!-- Dashboard Screen -->
    <div id="dashboardScreen">
      <div class="header">
        <div class="logo">CapCup</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      
      <div class="card-container">
        <div class="card-3d">
          <div class="card">
            <!-- 4D Orbs -->
            <div class="card-orb orb-1"></div>
            <div class="card-orb orb-2"></div>
            <div class="card-orb orb-3"></div>
            
            <div class="card-brand">
              <div class="brand-name">CapCup</div>
              <div class="card-status-badge" id="displayStatusBadge">ACTIVE</div>
            </div>
            
            <div class="chip-container">
              <div class="chip"></div>
            </div>
            
            <div class="card-number" id="displayCardNumber">4532 **** **** ****</div>
            
            <div class="card-details">
              <div class="detail-group">
                <div class="detail-label">Cardholder</div>
                <div class="detail-value" id="displayName">CAPCUP MEMBER</div>
              </div>
            </div>
            
            <div class="credits-box" id="creditsDisplay">
              <span class="credits-label">Available Credits</span>
              <span class="credits-amount"><span id="creditAmount">0</span> 💎</span>
            </div>
            
            <div class="contactless-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
      
      <div class="actions">
        <div id="actionMessage" class="message"></div>
        
        <button class="action-btn primary" onclick="getOnlineHelp()">
          <span class="btn-icon">🎓</span>
          <span>Get Premium Help (1 Credit)</span>
        </button>
        
        <button class="action-btn" onclick="toggleTaskForm()">
          <span class="btn-icon">📸</span>
          <span>Complete Task for Credits</span>
        </button>
        
        <div id="taskForm" class="hidden-form">
          <h4>Earn Credits by Completing Tasks</h4>
          <select id="taskType">
            <option value="share_fb">Share on Facebook (+5 Credits)</option>
            <option value="review">Write a Review (+5 Credits)</option>
            <option value="refer">Refer a Friend (+10 Credits)</option>
          </select>
          <input type="file" id="taskImage" accept="image/*" style="margin-bottom: 18px; width: 100%;">
          <button class="btn" onclick="submitTask()" style="margin-bottom: 10px;">Upload Screenshot</button>
          <button class="action-btn" onclick="toggleTaskForm()" style="text-align: center; justify-content: center;">Cancel</button>
        </div>
        
        <button class="action-btn" onclick="toggleRechargeForm()">
          <span class="btn-icon">💳</span>
          <span>Pay Monthly 10 Taka</span>
        </button>
        
        <div id="rechargeForm" class="hidden-form">
          <h4>Monthly Recharge</h4>
          <div class="payment-box">
            <p style="margin-bottom: 8px; color: #64748b;">Send 10 Taka to:</p>
            <p class="payment-number">01715783544</p>
            <p style="color: #64748b; font-size: 13px;">Nagad Personal</p>
          </div>
          <input type="text" id="rechargeTrxId" placeholder="Enter Nagad TrxID" style="margin-bottom: 18px;">
          <button class="btn" onclick="submitRecharge()" style="margin-bottom: 10px;">Submit for Verification</button>
          <button class="action-btn" onclick="toggleRechargeForm()" style="text-align: center; justify-content: center;">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxbpjpkF5C1FadjXYLtVVz64YNDY2_zf2u1A5dCc-dLTgCLiIlkbbUXfpsvXkLiqHEV/exec';
    const IMGBB_KEY = '65d48bd0c652eafd3aa6ef54949e7e44';
    
    let currentUser = null;
    
    const savedUser = localStorage.getItem('capcup_user');
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        showDashboard();
        loadUserData();
      } catch(e) {
        localStorage.removeItem('capcup_user');
      }
    }
    
    async function doLogin() {
      const phone = document.getElementById('loginPhone').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!phone || !password) {
        showMessage('loginMessage', 'Please enter phone and password', 'error');
        return;
      }
      
      showMessage('loginMessage', 'Logging in...', 'success');
      
      const params = new URLSearchParams({
        action: 'login',
        phone: phone,
        password: password
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        console.log('Login response:', data);
        
        if (data.status === 'success') {
          currentUser = data.user;
          currentUser.password = password;
          localStorage.setItem('capcup_user', JSON.stringify(currentUser));
          showDashboard();
          await loadUserData();
        } else {
          showMessage('loginMessage', data.message || 'Login failed', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('loginMessage', 'Connection error. Please try again.', 'error');
      }
    }
    
    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
    }
    
    async function loadUserData() {
      if (!currentUser || !currentUser.phone || !currentUser.password) {
        console.error('No user data available');
        return;
      }
      
      const params = new URLSearchParams({
        action: 'get_card_data',
        phone: currentUser.phone,
        password: currentUser.password
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        console.log('Card data response:', data);
        
        if (data.status === 'success') {
          currentUser = data.user;
          currentUser.password = currentUser.password;
          
          document.getElementById('displayName').textContent = (data.user.name || 'CAPCUP MEMBER').toUpperCase();
          document.getElementById('displayCardNumber').textContent = data.user.card_number || '4532 **** **** ****';
          document.getElementById('creditAmount').textContent = data.user.credits || 0;
          
          const statusBadge = document.getElementById('displayStatusBadge');
          const creditsBox = document.getElementById('creditsDisplay');
          
          statusBadge.textContent = data.user.card_status || 'PENDING';
          
          if (data.user.card_status === 'Active') {
            statusBadge.className = 'card-status-badge status-active';
            creditsBox.classList.remove('expired');
          } else if (data.user.card_status === 'Expired') {
            statusBadge.className = 'card-status-badge status-expired';
            creditsBox.classList.add('expired');
          } else {
            statusBadge.className = 'card-status-badge status-pending';
          }
          
          localStorage.setItem('capcup_user', JSON.stringify(currentUser));
        } else {
          console.error('Failed to load card data:', data.message);
        }
      } catch (error) {
        console.error('Load data error:', error);
      }
    }
    
    async function getOnlineHelp() {
      if (!currentUser) return;
      
      const params = new URLSearchParams({
        action: 'use_credit',
        phone: currentUser.phone,
        password: currentUser.password
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        if (data.status === 'success') {
          showMessage('actionMessage', '✅ ' + data.message + ' Credits: ' + data.credits_remaining, 'success');
          loadUserData();
        } else {
          showMessage('actionMessage', '❌ ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('actionMessage', 'Connection error', 'error');
      }
    }
    
    function toggleTaskForm() {
      const form = document.getElementById('taskForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
    
    async function submitTask() {
      const fileInput = document.getElementById('taskImage');
      const file = fileInput.files[0];
      
      if (!file) {
        alert('Please select a screenshot');
        return;
      }
      
      const formData = new FormData();
      formData.append('image', file);
      
      showMessage('actionMessage', 'Uploading image...', 'success');
      
      try {
        const uploadRes = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_KEY, {
          method: 'POST',
          body: formData
        });
        
        const uploadData = await uploadRes.json();
        
        if (uploadData.success) {
          const taskType = document.getElementById('taskType').value;
          
          const params = new URLSearchParams({
            action: 'submit_task',
            phone: currentUser.phone,
            task_type: taskType,
            image_url: uploadData.data.url
          });
          
          const response = await fetch(API_URL + '?' + params);
          const data = await response.json();
          
          if (data.status === 'success') {
            showMessage('actionMessage', '✅ Task submitted! Wait for approval.', 'success');
            toggleTaskForm();
            fileInput.value = '';
          } else {
            showMessage('actionMessage', '❌ ' + data.message, 'error');
          }
        } else {
          showMessage('actionMessage', 'Image upload failed', 'error');
        }
      } catch (error) {
        showMessage('actionMessage', 'Upload failed. Try again.', 'error');
      }
    }
    
    function toggleRechargeForm() {
      const form = document.getElementById('rechargeForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
    
    async function submitRecharge() {
      const trxId = document.getElementById('rechargeTrxId').value.trim();
      
      if (!trxId) {
        alert('Please enter Transaction ID');
        return;
      }
      
      const params = new URLSearchParams({
        action: 'recharge',
        phone: currentUser.phone,
        trx_id: trxId
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        if (data.status === 'success') {
          showMessage('actionMessage', '✅ Recharge submitted! Wait for verification.', 'success');
          toggleRechargeForm();
          document.getElementById('rechargeTrxId').value = '';
        } else {
          showMessage('actionMessage', '❌ ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('actionMessage', 'Connection error', 'error');
      }
    }
    
    function showMessage(elementId, text, type) {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.className = 'message ' + type;
      setTimeout(() => {
        el.className = 'message';
      }, 5000);
    }
    
    function logout() {
      localStorage.removeItem('capcup_user');
      location.reload();
    }
  </script>
</body>
  </html>
