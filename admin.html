<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCup Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height:100vh; color:#f1f5f9; }
        .container { max-width:1400px; margin:auto; padding:2rem; }
        .login-panel { max-width:400px; margin:100px auto; background:#1e293b; padding:2.5rem; border-radius:36px; box-shadow:0 25px 40px #00000080; }
        .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
        .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-bottom:2rem; }
        .stat-card { background:#1e293b; padding:1.5rem; border-radius:24px; border-left:6px solid #3b82f6; }
        .stat-card span { font-size:2.5rem; font-weight:700; }
        .btn { background:#3b82f6; color:white; border:none; padding:0.7rem 1.5rem; border-radius:40px; font-weight:600; cursor:pointer; margin:0 4px; }
        .btn-success { background:#10b981; }
        .btn-danger { background:#ef4444; }
        table { width:100%; border-collapse:collapse; background:#1e293b; border-radius:20px; overflow:hidden; }
        th { background:#0f172a; padding:1rem; text-align:left; }
        td { padding:0.8rem 1rem; border-bottom:1px solid #334155; }
        .badge { padding:4px 12px; border-radius:30px; font-weight:600; }
        .pending-section { background:#1e293b; border-radius:24px; padding:1.5rem; margin:2rem 0; }
        .hidden { display:none; }
        input { padding:0.8rem 1rem; border-radius:40px; border:none; background:#0f172a; color:white; width:100%; margin-bottom:1rem; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="login-panel">
        <h2 style="color:#fbbf24; margin-bottom:1.5rem;"><i class="fas fa-shield-alt"></i> Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <button class="btn" id="loginAdminBtn" style="width:100%;">Login</button>
        <p id="loginError" style="color:#ef4444;"></p>
    </div>

    <div id="mainPanel" class="hidden">
        <div class="admin-header">
            <h1><i class="fas fa-crown" style="color:#fbbf24;"></i> CapCup Admin</h1>
            <div><button class="btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button><button class="btn btn-danger" id="logoutAdminBtn">Logout</button></div>
        </div>
        <div class="stats">
            <div class="stat-card"><h3>Total Users</h3><span id="totalUsers">0</span></div>
            <div class="stat-card"><h3>Active Users</h3><span id="activeUsers">0</span></div>
            <div class="stat-card"><h3>Pending</h3><span id="pendingUsers">0</span></div>
        </div>
        <div class="pending-section">
            <h3><i class="fas fa-user-clock"></i> Pending Registrations</h3>
            <div id="pendingRegTable"></div>
        </div>
        <h3 style="margin:1.5rem 0;">📋 All Members</h3>
        <table><thead><tr><th>Name</th><th>Email</th><th>Card Number</th></tr></thead><tbody id="membersBody"></tbody></table>
    </div>
</div>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzuLQLT6CW-8DPsUSbw9DiN3fSXCNZHcRBDoGwNKLv3wl-7UE94a6t1sIkgzleT4Fy/exec';
    const ADMIN_PASS = 'capcup123';
    let auth = false;

    async function api(action, data={}) {
        const fd = new FormData(); fd.append('action', action); fd.append('adminPassword', ADMIN_PASS);
        Object.keys(data).forEach(k=> fd.append(k, data[k]));
        const res = await fetch(SCRIPT_URL, { method:'POST', body:fd }); return await res.json();
    }

    document.getElementById('loginAdminBtn').addEventListener('click', ()=>{
        if(document.getElementById('adminPass').value === ADMIN_PASS) {
            auth = true; document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden'); loadData();
        } else document.getElementById('loginError').innerText = 'Wrong password';
    });
    document.getElementById('logoutAdminBtn').addEventListener('click', ()=>{
        auth = false; document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainPanel').classList.add('hidden');
    });
    document.getElementById('refreshBtn').addEventListener('click', loadData);

    async function loadData() {
        const data = await api('getAdminData');
        if(data.success) {
            document.getElementById('totalUsers').innerText = data.total;
            document.getElementById('activeUsers').innerText = data.active;
            document.getElementById('pendingUsers').innerText = data.pending;
            let html = '<table><tr><th>Name</th><th>Email</th><th>TRX</th><th>Action</th></tr>';
            data.pendingList.forEach(u=> html+=`<tr><td>${u.name}</td><td>${u.email}</td><td>${u.trx}</td><td><button class="btn btn-success" onclick="approve('${u.email}')">Approve</button><button class="btn btn-danger" onclick="decline('${u.email}')">Decline</button></td></tr>`);
            document.getElementById('pendingRegTable').innerHTML = html + '</table>';
            let mhtml = '';
            data.members.forEach(m=> mhtml+=`<tr><td>${m.name}</td><td>${m.email}</td><td>${m.card || '—'}</td></tr>`);
            document.getElementById('membersBody').innerHTML = mhtml;
        }
    }

    window.approve = async (email)=> { await api('approveReg', {email}); loadData(); };
    window.decline = async (email)=> { await api('declineReg', {email}); loadData(); };
</script>
</body>
</html>
