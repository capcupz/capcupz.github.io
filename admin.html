<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup Admin · Premium Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    :root {
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
    }
    
    .admin-logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-success {
      background: var(--success);
      color: white;
    }
    
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    
    .btn-warning {
      background: var(--warning);
      color: white;
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
    
    .login-panel {
      max-width: 400px;
      margin: 100px auto;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .input-field {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      margin: 1rem 0;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.15);
    }
    
    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 2rem;
    }
    
    .admin-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .admin-card h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .request-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .request-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    .request-detail {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .action-buttons {
      display: flex;
      gap: 1rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .user-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    
    .user-table th {
      text-align: left;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .user-table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }
    
    .status-active { background: var(--success); }
    .status-expired { background: var(--danger); }
    .status-pending { background: var(--warning); }
  </style>
</head>
<body>
<div class="container">
  <div id="loginPanel">
    <div class="login-panel">
      <h2 style="text-align: center; margin-bottom: 2rem;">🔐 Admin Access</h2>
      <input type="password" id="adminPassword" class="input-field" placeholder="Enter admin password">
      <button class="btn btn-primary" style="width: 100%;" onclick="loginAdmin()">Access Panel</button>
      <p id="loginError" style="color: var(--danger); margin-top: 1rem; text-align: center;"></p>
      <p style="text-align: center; margin-top: 2rem;">
        <a href="index.html" style="color: var(--primary); text-decoration: none;">← Back to Website</a>
      </p>
    </div>
  </div>

  <div id="adminDashboard" style="display: none;">
    <div class="admin-header">
      <div>
        <span class="admin-logo">CapCup Admin</span>
        <span style="margin-left: 1rem; font-size: 0.9rem; opacity: 0.7;">Premium Control Panel</span>
      </div>
      <div style="display: flex; gap: 1rem;">
        <button class="btn btn-outline" onclick="refreshData()">⟳ Refresh</button>
        <button class="btn btn-danger" onclick="logoutAdmin()">Logout</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalUsers">0</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="activeUsers">0</div>
        <div class="stat-label">Active Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-label">Pending Approval</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="expiredCount">0</div>
        <div class="stat-label">Expired</div>
      </div>
    </div>

    <div class="admin-grid">
      <div class="admin-card">
        <h2>
          <span>⏳</span> Pending Registrations
          <span id="regCount" style="background: var(--primary); padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.9rem;"></span>
        </h2>
        <div id="pendingRegistrations"></div>
      </div>

      <div class="admin-card">
        <h2>
          <span>💳</span> Pending Monthly Payments
          <span id="rechargeCount" style="background: var(--warning); padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.9rem;"></span>
        </h2>
        <div id="pendingRecharges"></div>
      </div>
    </div>

    <div class="admin-card" style="margin-top: 2rem;">
      <h2><span>👥</span> All Members</h2>
      <div style="overflow-x: auto;">
        <table class="user-table">
          <thead>
            <tr>
              <th>Status</th>
              <th>Name</th>
              <th>Email</th>
              <th>Card Number</th>
              <th>Due Date</th>
              <th>Months Paid</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="allUsersTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // =============================================
  // CAPCUP ADMIN - YOUR SCRIPT URL
  // =============================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwO3VLT6EaBvHaJu2gqALdnFkYQkQ3E7WfUPB9AJxodZUW8PE8MtB-u_JJg5P4uCTQmZw/exec';
  const ADMIN_PASSWORD = 'capcup123';
  
  let allUsers = [];

  if(sessionStorage.getItem('adminLoggedIn') === 'true') {
    showDashboard();
  }

  function loginAdmin() {
    const password = document.getElementById('adminPassword').value;
    
    if(password === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      showDashboard();
    } else {
      document.getElementById('loginError').innerText = 'Invalid password';
    }
  }

  function showDashboard() {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    refreshData();
  }

  function logoutAdmin() {
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('adminDashboard').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  async function callAppsScript(action, params = {}) {
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...params })
      });
      
      if (response.ok) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch(e) {
          return { success: true };
        }
      }
      return { success: false };
    } catch (error) {
      console.error('API Error:', error);
      return { success: false };
    }
  }

  async function refreshData() {
    const res = await callAppsScript('adminGetAllData');
    
    if (res.users) {
      allUsers = res.users;
      updateStats();
      updateAllUsersTable();
    }
    
    const regDiv = document.getElementById('pendingRegistrations');
    const regCount = document.getElementById('regCount');
    
    if(res.pendingReg && res.pendingReg.length > 0) {
      regCount.innerText = res.pendingReg.length;
      regDiv.innerHTML = res.pendingReg.map(user => `
        <div class="request-item">
          <div class="request-header">
            <span class="request-title">${user.Name || user.name || 'N/A'}</span>
            <span style="opacity: 0.7;">${user.Email || user.email}</span>
          </div>
          <div class="request-detail">
            Transaction ID: ${user['Signup TRX ID'] || user.signupTRXID || 'N/A'}<br>
            Registered: ${user.Timestamp || user.timestamp || 'N/A'}
          </div>
          <div class="action-buttons">
            <button class="btn btn-success" onclick="approveUser('${user.Email || user.email}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="declineUser('${user.Email || user.email}')">✗ Decline</button>
          </div>
        </div>
      `).join('');
    } else {
      regCount.innerText = '0';
      regDiv.innerHTML = '<div class="empty-state">No pending registrations</div>';
    }
    
    const recDiv = document.getElementById('pendingRecharges');
    const recCount = document.getElementById('rechargeCount');
    
    if(res.pendingPayments && res.pendingPayments.length > 0) {
      recCount.innerText = res.pendingPayments.length;
      recDiv.innerHTML = res.pendingPayments.map(payment => `
        <div class="request-item">
          <div class="request-header">
            <span class="request-title">${payment.Name || payment.name || payment.Email || payment.email}</span>
          </div>
          <div class="request-detail">
            Email: ${payment.Email || payment.email}<br>
            Transaction ID: ${payment['Current Month TRX ID'] || payment.currentMonthTRXID}<br>
            Current Due: ${payment['Payment Due Date'] || payment.paymentDueDate || 'N/A'}<br>
            Months Paid: ${payment['Months Paid Count'] || payment.monthsPaidCount || 0}
          </div>
          <div class="action-buttons">
            <button class="btn btn-success" onclick="approvePayment('${payment.Email || payment.email}', '${payment['Current Month TRX ID'] || payment.currentMonthTRXID}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="declinePayment('${payment.Email || payment.email}')">✗ Decline</button>
          </div>
        </div>
      `).join('');
    } else {
      recCount.innerText = '0';
      recDiv.innerHTML = '<div class="empty-state">No pending payments</div>';
    }
  }

  function updateStats() {
    const today = new Date();
    
    const totalUsers = allUsers.length;
    const activeUsers = allUsers.filter(u => {
      const dueDate = u['Payment Due Date'] ? new Date(u['Payment Due Date']) : null;
      return u['Active Status'] === 'TRUE' && dueDate && dueDate >= today && u['Signup Approved'] === 'TRUE';
    }).length;
    const pendingCount = allUsers.filter(u => u['Signup Approved'] !== 'TRUE').length;
    const expiredCount = allUsers.filter(u => {
      const dueDate = u['Payment Due Date'] ? new Date(u['Payment Due Date']) : null;
      return u['Signup Approved'] === 'TRUE' && dueDate && dueDate < today;
    }).length;
    
    document.getElementById('totalUsers').innerText = totalUsers;
    document.getElementById('activeUsers').innerText = activeUsers;
    document.getElementById('pendingCount').innerText = pendingCount;
    document.getElementById('expiredCount').innerText = expiredCount;
  }

  function updateAllUsersTable() {
    const tbody = document.getElementById('allUsersTable');
    const today = new Date();
    
    tbody.innerHTML = allUsers.map(user => {
      const dueDate = user['Payment Due Date'] ? new Date(user['Payment Due Date']) : null;
      const isApproved = user['Signup Approved'] === 'TRUE';
      const isActive = user['Active Status'] === 'TRUE';
      const isExpired = dueDate && dueDate < today;
      const hasPendingPayment = user['Current Month Paid'] === 'FALSE' && user['Current Month TRX ID'];
      
      let statusClass = 'status-pending';
      let statusText = 'Pending';
      
      if (isApproved && hasPendingPayment) {
        statusClass = 'status-pending';
        statusText = 'Payment Pending';
      } else if (isApproved && isActive && !isExpired) {
        statusClass = 'status-active';
        statusText = 'Active';
      } else if (isApproved && (!isActive || isExpired)) {
        statusClass = 'status-expired';
        statusText = 'Expired';
      }
      
      const formattedDueDate = dueDate ? dueDate.toLocaleDateString('en-GB') : 'N/A';
      const email = user.Email || user.email;
      const name = user.Name || user.name || 'N/A';
      const cardNumber = user['Card Number'] || user.cardNumber || 'N/A';
      const monthsPaid = user['Months Paid Count'] || user.monthsPaidCount || 0;
      const currentTrx = user['Current Month TRX ID'] || user.currentMonthTRXID || '';
      
      return `
        <tr>
          <td>
            <span class="status-indicator ${statusClass}"></span>
            ${statusText}
          </td>
          <td>${name}</td>
          <td>${email}</td>
          <td>${cardNumber}</td>
          <td>${formattedDueDate}</td>
          <td>${monthsPaid}</td>
          <td>
            ${!isApproved ? 
              `<button class="btn btn-success" style="padding:0.25rem 0.75rem;" onclick="approveUser('${email}')">Approve</button>` : 
              hasPendingPayment ?
              `<button class="btn btn-success" style="padding:0.25rem 0.75rem;" onclick="approvePayment('${email}', '${currentTrx}')">Approve Payment</button>` :
              isExpired || !isActive ?
              `<button class="btn btn-warning" style="padding:0.25rem 0.75rem;" onclick="manualActivate('${email}')">Activate</button>` :
              `<button class="btn btn-danger" style="padding:0.25rem 0.75rem;" onclick="deactivateUser('${email}')">Deactivate</button>`
            }
          </td>
        </tr>
      `;
    }).join('');
  }

  async function approveUser(email) {
    await callAppsScript('approveUser', { email });
    refreshData();
  }

  async function declineUser(email) {
    await callAppsScript('declineUser', { email });
    refreshData();
  }

  async function approvePayment(email, trxId) {
    await callAppsScript('approvePayment', { email, trxId });
    refreshData();
  }

  async function declinePayment(email) {
    await callAppsScript('declinePayment', { email });
    refreshData();
  }

  async function manualActivate(email) {
    if(confirm('Manually activate this user for 30 days?')) {
      await callAppsScript('manualActivate', { email });
      refreshData();
    }
  }

  async function deactivateUser(email) {
    if(confirm('Deactivate this user? They will not be able to access premium features.')) {
      await callAppsScript('deactivateUser', { email });
      refreshData();
    }
  }

  window.loginAdmin = loginAdmin;
  window.logoutAdmin = logoutAdmin;
  window.refreshData = refreshData;
  window.approveUser = approveUser;
  window.declineUser = declineUser;
  window.approvePayment = approvePayment;
  window.declinePayment = declinePayment;
  window.manualActivate = manualActivate;
  window.deactivateUser = deactivateUser;
</script>
</body>
            </html>
