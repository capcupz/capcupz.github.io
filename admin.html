<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>CapCup Admin · Premium Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height:100vh; color:#f1f5f9; }
        .container { max-width:1400px; margin:auto; padding:2rem 1.8rem; }
        .login-panel { max-width:420px; margin: 100px auto; background:#1e293b; padding:2.5rem; border-radius:36px; box-shadow:0 25px 40px #00000080; border:1px solid #334155; }
        .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem; flex-wrap:wrap; }
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1.8rem; margin-bottom:2.5rem; }
        .stat-card { background:#1e293b; padding:1.8rem 1.5rem; border-radius:28px; border-left:8px solid #3b82f6; box-shadow:0 10px 18px #00000030; }
        .stat-card h3 { font-weight:500; opacity:0.8; margin-bottom:0.6rem; }
        .stat-card span { font-size:2.5rem; font-weight:700; }
        .btn { background:#3b82f6; color:white; border:none; padding:0.7rem 1.8rem; border-radius:60px; font-weight:600; cursor:pointer; transition:0.15s; }
        .btn:hover { background:#2563eb; }
        .btn-danger { background:#ef4444; }
        .btn-danger:hover { background:#dc2626; }
        .btn-success { background:#10b981; }
        .btn-success:hover { background:#059669; }
        table { width:100%; border-collapse:collapse; background:#1e293b; border-radius:24px; overflow:hidden; box-shadow:0 8px 20px #00000040; }
        th { background:#0f172a; padding:1.2rem 1rem; text-align:left; font-weight:600; }
        td { padding:1rem 1rem; border-bottom:1px solid #334155; }
        .badge { padding:4px 14px; border-radius:40px; font-weight:600; font-size:0.85rem; }
        .pending-section { background:#1e293b; border-radius:28px; padding:1.8rem; margin:2.2rem 0; border:1px solid #2d3a4e; }
        .flex { display:flex; gap:1rem; flex-wrap:wrap; }
        input { padding:0.8rem 1.2rem; border-radius:40px; border:none; background:#0f172a; color:white; border:1px solid #334155; width:100%; }
        .hidden { display:none !important; }
        .action-btn { margin-right:6px; }
        @media (max-width:900px) { .stats { grid-template-columns: repeat(2,1fr); } }
        .loading { text-align:center; padding:2rem; color:#94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="login-panel">
        <h2 style="color:#fbbf24; margin-bottom:2rem;"><i class="fas fa-shield-alt"></i> Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Admin password" style="margin-bottom:1.2rem;">
        <button class="btn" id="loginAdminBtn" style="width:100%; padding:1rem;">Login</button>
        <p id="loginError" style="color:#ef4444; margin-top:1rem;"></p>
    </div>

    <div id="mainPanel" class="hidden">
        <div class="admin-header">
            <h1><i class="fas fa-crown" style="color:#fbbf24;"></i> CapCup Admin</h1>
            <div>
                <button class="btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn btn-danger" id="logoutAdminBtn">Logout</button>
            </div>
        </div>
        
        <div class="stats" id="statsContainer">
            <div class="stat-card"><h3>Total Users</h3><span id="totalUsers">0</span></div>
            <div class="stat-card"><h3>Active</h3><span id="activeUsers">0</span></div>
            <div class="stat-card"><h3>Pending Reg</h3><span id="pendingReg">0</span></div>
            <div class="stat-card"><h3>Expired</h3><span id="expiredUsers">0</span></div>
        </div>

        <div class="pending-section">
            <h3><i class="fas fa-user-clock"></i> Pending Registrations</h3>
            <div id="pendingRegTable"><p class="loading">Loading...</p></div>
        </div>
        
        <div class="pending-section">
            <h3><i class="fas fa-hand-holding-usd"></i> Pending Monthly Payments</h3>
            <div id="pendingPayTable"><p class="loading">Loading...</p></div>
        </div>

        <h3 style="margin:1.8rem 0 1.2rem;">📋 All Members</h3>
        <div style="overflow-x:auto;">
            <table id="membersTable">
                <thead><tr><th>Status</th><th>Name</th><th>Email</th><th>Card Number</th><th>Due Date</th><th>Months Paid</th></tr></thead>
                <tbody id="membersTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function(){
        // CONFIGURATION - YOUR DEPLOYED SCRIPT URL (update after deployment)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJg_MkP9XfH7VnQxZ8B2L5vRmP-TEjE3kUzF6qHzWc0dN-lG8XwY/exec';
        const ADMIN_PASSWORD = 'capcup123';
        let adminAuth = false;

        async function adminApi(action, data = {}) {
            const formData = new FormData();
            formData.append('action', action);
            formData.append('adminPassword', ADMIN_PASSWORD);
            Object.keys(data).forEach(k => formData.append(k, data[k]));
            
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                return await res.json();
            } catch(e) {
                console.error('API Error:', e);
                return { success: false, message: 'Network error' };
            }
        }

        document.getElementById('loginAdminBtn').addEventListener('click', async ()=>{
            const pass = document.getElementById('adminPass').value;
            if(pass === ADMIN_PASSWORD) {
                adminAuth = true;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainPanel').classList.remove('hidden');
                await loadAllData();
            } else {
                document.getElementById('loginError').innerText = 'Invalid password';
            }
        });

        document.getElementById('logoutAdminBtn').addEventListener('click', ()=>{
            adminAuth = false;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainPanel').classList.add('hidden');
            document.getElementById('adminPass').value = '';
        });

        async function loadAllData() {
            if(!adminAuth) return;
            
            const data = await adminApi('getAdminData');
            
            if(data.success) {
                updateStats(data.stats);
                renderPendingReg(data.pendingReg);
                renderPendingPay(data.pendingPayments);
                renderMembers(data.users);
            } else {
                alert('Failed to load data: ' + (data.message || 'Unknown error'));
            }
        }

        function updateStats(s) {
            document.getElementById('totalUsers').innerText = s.total || 0;
            document.getElementById('activeUsers').innerText = s.active || 0;
            document.getElementById('pendingReg').innerText = s.pendingReg || 0;
            document.getElementById('expiredUsers').innerText = s.expired || 0;
        }

        function renderPendingReg(users) {
            const container = document.getElementById('pendingRegTable');
            if(!users || users.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8;">No pending registrations.</p>';
                return;
            }
            
            let html = '<table><tr><th>Name</th><th>Email</th><th>TrxID</th><th>Date</th><th>Action</th></tr>';
            users.forEach(u => {
                html += `<tr>
                    <td>${u.name || ''}</td>
                    <td>${u.email || ''}</td>
                    <td>${u.trx || ''}</td>
                    <td>${u.signupDate || ''}</td>
                    <td>
                        <button class="btn btn-success action-btn" onclick="approveReg('${u.email}')">Approve</button>
                        <button class="btn btn-danger" onclick="declineReg('${u.email}')">Decline</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        function renderPendingPay(payments) {
            const container = document.getElementById('pendingPayTable');
            if(!payments || payments.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8;">No pending payments.</p>';
                return;
            }
            
            let html = '<table><tr><th>Name</th><th>Email</th><th>TrxID</th><th>Action</th></tr>';
            payments.forEach(p => {
                html += `<tr>
                    <td>${p.name || ''}</td>
                    <td>${p.email || ''}</td>
                    <td>${p.trx || ''}</td>
                    <td>
                        <button class="btn btn-success action-btn" onclick="approvePayment('${p.email}')">Approve</button>
                        <button class="btn btn-danger" onclick="declinePayment('${p.email}')">Decline</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        function renderMembers(users) {
            const tbody = document.getElementById('membersTableBody');
            if(!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem;">No members found</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            users.forEach(u => {
                let status = 'Pending';
                let statusColor = '#f59e0b';
                
                if(u.approved) {
                    if(u.active) {
                        status = 'Active';
                        statusColor = '#10b981';
                    } else {
                        status = 'Expired';
                        statusColor = '#ef4444';
                    }
                }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="badge" style="background:${statusColor}">${status}</span></td>
                    <td>${u.name || ''}</td>
                    <td>${u.email || ''}</td>
                    <td>${u.cardNumber || '—'}</td>
                    <td>${u.dueDate || '—'}</td>
                    <td>${u.monthsPaid || 0}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Global functions for onclick handlers
        window.approveReg = async (email) => {
            if(!confirm('Approve this registration?')) return;
            await adminApi('approveReg', { email });
            await loadAllData();
        };
        
        window.declineReg = async (email) => {
            if(!confirm('Decline this registration? This will delete the user.')) return;
            await adminApi('declineReg', { email });
            await loadAllData();
        };
        
        window.approvePayment = async (email) => {
            if(!confirm('Approve this monthly payment?')) return;
            await adminApi('approvePayment', { email });
            await loadAllData();
        };
        
        window.declinePayment = async (email) => {
            if(!confirm('Decline this payment?')) return;
            await adminApi('declinePayment', { email });
            await loadAllData();
        };

        document.getElementById('refreshBtn').addEventListener('click', loadAllData);
        
        // Enter key for login
        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('loginAdminBtn').click();
        });
    })();
</script>
</body>
              </html>
