<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>CapCup Admin · Premium Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height:100vh; color:#f1f5f9; }
        .container { max-width:1400px; margin:auto; padding:2rem 1.8rem; }
        
        .login-panel { 
            max-width:420px; 
            margin: 100px auto; 
            background:#1e293b; 
            padding:2.5rem; 
            border-radius:36px; 
            box-shadow:0 25px 40px #00000080; 
            border:1px solid #334155; 
        }
        
        .admin-header { 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            margin-bottom:2.5rem; 
            flex-wrap:wrap; 
        }
        
        .stats { 
            display:grid; 
            grid-template-columns:repeat(2,1fr); 
            gap:1.8rem; 
            margin-bottom:2.5rem; 
        }
        
        .stat-card { 
            background:#1e293b; 
            padding:1.8rem 1.5rem; 
            border-radius:28px; 
            border-left:8px solid #3b82f6; 
            box-shadow:0 10px 18px #00000030; 
        }
        
        .stat-card h3 { 
            font-weight:500; 
            opacity:0.8; 
            margin-bottom:0.6rem; 
            font-size:1.1rem;
        }
        
        .stat-card span { 
            font-size:2.5rem; 
            font-weight:700; 
        }
        
        .btn { 
            background:#3b82f6; 
            color:white; 
            border:none; 
            padding:0.7rem 1.8rem; 
            border-radius:60px; 
            font-weight:600; 
            cursor:pointer; 
            transition:0.15s; 
            font-size:0.95rem;
        }
        
        .btn:hover { background:#2563eb; }
        .btn-danger { background:#ef4444; }
        .btn-danger:hover { background:#dc2626; }
        .btn-success { background:#10b981; }
        .btn-success:hover { background:#059669; }
        
        table { 
            width:100%; 
            border-collapse:collapse; 
            background:#1e293b; 
            border-radius:24px; 
            overflow:hidden; 
            box-shadow:0 8px 20px #00000040; 
        }
        
        th { 
            background:#0f172a; 
            padding:1.2rem 1rem; 
            text-align:left; 
            font-weight:600; 
        }
        
        td { 
            padding:1rem 1rem; 
            border-bottom:1px solid #334155; 
        }
        
        .badge { 
            padding:4px 14px; 
            border-radius:40px; 
            font-weight:600; 
            font-size:0.85rem; 
            display:inline-block;
        }
        
        .pending-section { 
            background:#1e293b; 
            border-radius:28px; 
            padding:1.8rem; 
            margin:2.2rem 0; 
            border:1px solid #2d3a4e; 
        }
        
        .pending-section h3 {
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }
        
        input { 
            padding:0.8rem 1.2rem; 
            border-radius:40px; 
            border:none; 
            background:#0f172a; 
            color:white; 
            border:1px solid #334155; 
            width:100%; 
            font-size:1rem;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .hidden { display:none !important; }
        .action-btn { margin-right:6px; }
        .loading { text-align:center; padding:2rem; color:#94a3b8; }
        
        @media (max-width:768px) { 
            .stats { grid-template-columns: 1fr; } 
        }
        
        i { margin-right: 6px; }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
        }
        
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="login-panel">
        <h2 style="color:#fbbf24; margin-bottom:2rem; font-size:1.8rem;">
            <i class="fas fa-shield-alt"></i> Admin Access
        </h2>
        <input type="password" id="adminPass" placeholder="Admin password" style="margin-bottom:1.2rem;">
        <button class="btn" id="loginAdminBtn" style="width:100%; padding:1rem; font-size:1.1rem;">
            <i class="fas fa-lock-open"></i> Login
        </button>
        <p id="loginError" style="color:#ef4444; margin-top:1rem; text-align:center;"></p>
    </div>

    <div id="mainPanel" class="hidden">
        <div class="admin-header">
            <h1 style="font-size:2rem;">
                <i class="fas fa-crown" style="color:#fbbf24;"></i> CapCup Admin
            </h1>
            <div style="display:flex; gap:1rem;">
                <button class="btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="btn btn-danger" id="logoutAdminBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <h3><i class="fas fa-user-check"></i> Total Approved Users</h3>
                <span id="totalApprovedUsers">0</span>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-user-clock"></i> Pending Users</h3>
                <span id="pendingUsers">0</span>
            </div>
        </div>

        <div class="pending-section">
            <h3>
                <i class="fas fa-user-clock" style="color:#fbbf24;"></i> 
                Pending Registrations
            </h3>
            <div id="pendingRegTable">
                <p class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </p>
            </div>
        </div>

        <h3 style="margin:1.8rem 0 1.2rem; font-size:1.5rem;">
            <i class="fas fa-users"></i> All Approved Members
        </h3>
        <div class="table-wrapper">
            <table id="membersTable">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Card Number</th>
                        <th>Registration Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody">
                    <tr>
                        <td colspan="6" style="text-align:center; padding:2rem;">
                            <i class="fas fa-spinner fa-spin"></i> Loading members...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function(){
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyfYQr35zXctxHcZNbCsMaHaZPEbsHUmgJCj-SiMbGF1jw_NuiYFSSau1mqTcUES046/exec';
        const ADMIN_PASSWORD = 'capcup123';
        let adminAuth = false;

        async function adminApi(action, data = {}) {
            const formData = new FormData();
            formData.append('action', action);
            formData.append('adminPassword', ADMIN_PASSWORD);
            Object.keys(data).forEach(k => formData.append(k, data[k]));
            
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                const json = await res.json();
                return json;
            } catch(e) {
                console.error('API Error:', e);
                return { success: false, message: 'Network error' };
            }
        }

        document.getElementById('loginAdminBtn').addEventListener('click', async ()=>{
            const pass = document.getElementById('adminPass').value;
            if(pass === ADMIN_PASSWORD) {
                adminAuth = true;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainPanel').classList.remove('hidden');
                await loadAllData();
            } else {
                document.getElementById('loginError').innerText = '❌ Invalid password';
            }
        });

        document.getElementById('logoutAdminBtn').addEventListener('click', ()=>{
            adminAuth = false;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainPanel').classList.add('hidden');
            document.getElementById('adminPass').value = '';
            document.getElementById('loginError').innerText = '';
        });

        async function loadAllData() {
            if(!adminAuth) return;
            
            const data = await adminApi('getAdminData');
            
            if(data.success) {
                updateStats(data.stats);
                renderPendingReg(data.pendingReg);
                renderMembers(data.approvedUsers || []);
            } else {
                alert('Failed to load data: ' + (data.message || 'Unknown error'));
            }
        }

        function updateStats(s) {
            document.getElementById('totalApprovedUsers').innerText = s.totalApproved || 0;
            document.getElementById('pendingUsers').innerText = s.pending || 0;
        }

        function renderPendingReg(users) {
            const container = document.getElementById('pendingRegTable');
            if(!users || users.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8; text-align:center; padding:1rem;"><i class="fas fa-check-circle"></i> No pending registrations.</p>';
                return;
            }
            
            let html = '<div class="table-wrapper"><table><thead><tr><th>Name</th><th>Email</th><th>TrxID</th><th>Date</th><th>Action</th></tr></thead><tbody>';
            users.forEach(u => {
                html += `<tr>
                    <td><i class="fas fa-user"></i> ${u.name || 'N/A'}</td>
                    <td><i class="fas fa-envelope"></i> ${u.email || 'N/A'}</td>
                    <td><i class="fas fa-receipt"></i> ${u.trx || 'N/A'}</td>
                    <td><i class="fas fa-calendar"></i> ${u.signupDate || 'N/A'}</td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-success action-btn" onclick="approveReg('${u.email}')">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="btn btn-danger" onclick="declineReg('${u.email}')">
                                <i class="fas fa-times"></i> Decline
                            </button>
                        </div>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function renderMembers(users) {
            const tbody = document.getElementById('membersTableBody');
            if(!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color:#94a3b8;"><i class="fas fa-users-slash"></i> No approved members found</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            users.forEach(u => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="badge" style="background:#10b981"><i class="fas fa-check-circle"></i> Approved</span></td>
                    <td><i class="fas fa-user"></i> ${u.name || 'N/A'}</td>
                    <td><i class="fas fa-envelope"></i> ${u.email || 'N/A'}</td>
                    <td><i class="fas fa-credit-card"></i> ${u.cardNumber || '—'}</td>
                    <td><i class="fas fa-calendar-alt"></i> ${u.signupDate || '—'}</td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-danger" onclick="deleteUser('${u.email}')" style="padding:0.4rem 1rem;">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        window.approveReg = async (email) => {
            if(!confirm('✅ Approve this registration?')) return;
            const result = await adminApi('approveReg', { email });
            if(result.success) {
                alert('Registration approved successfully!');
                await loadAllData();
            } else {
                alert('Failed to approve: ' + result.message);
            }
        };
        
        window.declineReg = async (email) => {
            if(!confirm('❌ Decline this registration? This will delete the user.')) return;
            const result = await adminApi('declineReg', { email });
            if(result.success) {
                alert('Registration declined and deleted.');
                await loadAllData();
            } else {
                alert('Failed to decline: ' + result.message);
            }
        };
        
        window.deleteUser = async (email) => {
            if(!confirm('⚠️ Are you sure you want to delete this user? This action cannot be undone.')) return;
            const result = await adminApi('deleteUser', { email });
            if(result.success) {
                alert('User deleted successfully!');
                await loadAllData();
            } else {
                alert('Failed to delete user: ' + result.message);
            }
        };

        document.getElementById('refreshBtn').addEventListener('click', loadAllData);
        
        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('loginAdminBtn').click();
        });

        document.getElementById('adminPass').focus();
    })();
</script>
</body>
</html>
