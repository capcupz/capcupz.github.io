<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup - My Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      color: #1e293b;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      margin-bottom: 20px;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #1e3a5f;
    }
    
    .logo span {
      color: #3b82f6;
    }
    
    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Login Screen */
    #loginScreen {
      background: white;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }
    
    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 10px;
    }
    
    .login-subtitle {
      color: #64748b;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #1e3a5f;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1e3a5f, #2d5a8a);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    
    /* Dashboard Screen */
    #dashboardScreen {
      display: none;
    }
    
    .card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 24px;
      padding: 30px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    .card-type {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .card-type span {
      color: #ffd700;
      font-weight: 700;
      font-size: 20px;
    }
    
    .card-status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .status-active {
      background: #22c55e;
      color: white;
    }
    
    .status-expired {
      background: #ef4444;
      color: white;
    }
    
    .status-pending {
      background: #f59e0b;
      color: white;
    }
    
    .chip {
      width: 50px;
      height: 40px;
      background: linear-gradient(135deg, #ffd700, #d4af37);
      border-radius: 8px;
      margin-bottom: 25px;
    }
    
    .card-number {
      font-size: 24px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.95);
      margin-bottom: 25px;
      font-family: 'Courier New', monospace;
      font-weight: 600;
    }
    
    .card-details {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    
    .card-details span {
      color: rgba(255,255,255,0.95);
      font-size: 14px;
      text-transform: none;
      font-weight: 500;
    }
    
    .credits-box {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 15px 20px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    
    .credits-box.expired {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }
    
    .credits-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .credits-amount {
      font-size: 28px;
      font-weight: 700;
    }
    
    /* Action Buttons */
    .actions {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }
    
    .action-btn {
      width: 100%;
      padding: 16px;
      background: #f1f5f9;
      color: #1e3a5f;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .action-btn:hover {
      background: #e2e8f0;
    }
    
    .action-btn.primary {
      background: linear-gradient(135deg, #1e3a5f, #2d5a8a);
      color: white;
      border: none;
    }
    
    .action-btn.primary:hover {
      background: linear-gradient(135deg, #2d5a8a, #1e3a5f);
    }
    
    .hidden-form {
      background: #f8fafc;
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      display: none;
      border: 1px solid #e2e8f0;
    }
    
    .hidden-form h4 {
      color: #1e3a5f;
      margin-bottom: 15px;
    }
    
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    
    .message {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    
    .message.success {
      background: #dcfce7;
      border: 2px solid #22c55e;
      color: #166534;
      display: block;
    }
    
    .message.error {
      background: #fee2e2;
      border: 2px solid #ef4444;
      color: #991b1b;
      display: block;
    }
    
    .payment-box {
      background: #f0f9ff;
      border: 2px solid #3b82f6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .payment-number {
      font-size: 22px;
      font-weight: 700;
      color: #1e3a5f;
      margin: 8px 0;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #3b82f6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Screen -->
    <div id="loginScreen">
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Login to access your dashboard</p>
      
      <div id="loginMessage" class="message"></div>
      
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="loginPhone" placeholder="017XXXXXXXX">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      
      <button class="btn" onclick="doLogin()">Login to Dashboard</button>
      
      <p class="back-link">
        <a href="index.html">← Back to Registration</a>
      </p>
    </div>
    
    <!-- Dashboard Screen -->
    <div id="dashboardScreen">
      <div class="header">
        <div class="logo">Cap<span>Cup</span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      
      <div class="card">
        <div class="card-type">
          <span>Platinum</span>
          <span class="card-status" id="displayStatusBadge">ACTIVE</span>
        </div>
        <div class="chip"></div>
        <div class="card-number" id="displayCardNumber">4532 **** **** ****</div>
        <div class="card-details">
          <div>CARDHOLDER<br><span id="displayName">---</span></div>
          <div>VALID THRU<br><span id="displayExpiry">--/--</span></div>
        </div>
        <div class="credits-box" id="creditsDisplay">
          <span class="credits-label">Available Credits</span>
          <span class="credits-amount"><span id="creditAmount">0</span> 💎</span>
        </div>
      </div>
      
      <div class="actions">
        <div id="actionMessage" class="message"></div>
        
        <button class="action-btn primary" onclick="getOnlineHelp()">
          <span>🎓</span> Get Online Help (1 Credit)
        </button>
        
        <button class="action-btn" onclick="toggleTaskForm()">
          <span>📸</span> Submit Task for Credits
        </button>
        
        <div id="taskForm" class="hidden-form">
          <h4>Complete a Task to Earn Credits</h4>
          <select id="taskType">
            <option value="share_fb">Share on Facebook (+5 Credits)</option>
            <option value="review">Write a Review (+5 Credits)</option>
            <option value="refer">Refer a Friend (+10 Credits)</option>
          </select>
          <input type="file" id="taskImage" accept="image/*" style="margin-bottom: 15px;">
          <button class="btn" onclick="submitTask()">Upload Screenshot</button>
          <button class="action-btn" onclick="toggleTaskForm()" style="text-align: center;">Cancel</button>
        </div>
        
        <button class="action-btn" onclick="toggleRechargeForm()">
          <span>💳</span> Pay Monthly 10 Taka
        </button>
        
        <div id="rechargeForm" class="hidden-form">
          <h4>Monthly Recharge</h4>
          <div class="payment-box">
            <p style="margin-bottom: 5px;">Send 10 Taka to:</p>
            <p class="payment-number">01715783544</p>
            <p style="color: #64748b; font-size: 13px;">Nagad Personal</p>
          </div>
          <input type="text" id="rechargeTrxId" placeholder="Enter Nagad TrxID" style="margin-bottom: 15px;">
          <button class="btn" onclick="submitRecharge()">Submit for Verification</button>
          <button class="action-btn" onclick="toggleRechargeForm()" style="text-align: center;">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxbpjpkF5C1FadjXYLtVVz64YNDY2_zf2u1A5dCc-dLTgCLiIlkbbUXfpsvXkLiqHEV/exec';
    const IMGBB_KEY = '65d48bd0c652eafd3aa6ef54949e7e44';
    
    let currentUser = null;
    
    // Check if already logged in
    const savedUser = localStorage.getItem('capcup_user');
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        showDashboard();
        loadUserData();
      } catch(e) {
        localStorage.removeItem('capcup_user');
      }
    }
    
    async function doLogin() {
      const phone = document.getElementById('loginPhone').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!phone || !password) {
        showMessage('loginMessage', 'Please enter phone and password', 'error');
        return;
      }
      
      showMessage('loginMessage', 'Logging in...', 'success');
      
      const params = new URLSearchParams({
        action: 'login',
        phone: phone,
        password: password
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        if (data.status === 'success') {
          currentUser = data.user;
          currentUser.password = password;
          localStorage.setItem('capcup_user', JSON.stringify(currentUser));
          showDashboard();
          loadUserData();
        } else {
          showMessage('loginMessage', data.message, 'error');
        }
      } catch (error) {
        showMessage('loginMessage', 'Connection error. Please try again.', 'error');
      }
    }
    
    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
    }
    
    async function loadUserData() {
      const params = new URLSearchParams({
        action: 'get_card_data',
        phone: currentUser.phone,
        password: currentUser.password
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        if (data.status === 'success') {
          currentUser = data.user;
          
          document.getElementById('displayName').textContent = data.user.name || 'User';
          document.getElementById('displayCardNumber').textContent = data.user.card_number || '4532 **** **** ****';
          document.getElementById('creditAmount').textContent = data.user.credits || 0;
          
          const expiry = new Date(data.user.expiry);
          const month = (expiry.getMonth() + 1).toString().padStart(2, '0');
          const year = expiry.getFullYear().toString().slice(-2);
          document.getElementById('displayExpiry').textContent = month + '/' + year;
          
          const statusBadge = document.getElementById('displayStatusBadge');
          const creditsBox = document.getElementById('creditsDisplay');
          
          statusBadge.textContent = data.user.card_status || 'PENDING';
          
          if (data.user.card_status === 'Active') {
            statusBadge.className = 'card-status status-active';
            creditsBox.classList.remove('expired');
          } else if (data.user.card_status === 'Expired') {
            statusBadge.className = 'card-status status-expired';
            creditsBox.classList.add('expired');
          } else {
            statusBadge.className = 'card-status status-pending';
          }
        }
      } catch (error) {
        console.error('Load data error:', error);
      }
    }
    
    async function getOnlineHelp() {
      if (!currentUser) return;
      
      const params = new URLSearchParams({
        action: 'use_credit',
        phone: currentUser.phone,
        password: currentUser.password
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        if (data.status === 'success') {
          showMessage('actionMessage', '✅ ' + data.message + ' Credits: ' + data.credits_remaining, 'success');
          loadUserData();
        } else {
          showMessage('actionMessage', '❌ ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('actionMessage', 'Connection error', 'error');
      }
    }
    
    function toggleTaskForm() {
      const form = document.getElementById('taskForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
    
    async function submitTask() {
      const fileInput = document.getElementById('taskImage');
      const file = fileInput.files[0];
      
      if (!file) {
        alert('Please select a screenshot');
        return;
      }
      
      const formData = new FormData();
      formData.append('image', file);
      
      showMessage('actionMessage', 'Uploading image...', 'success');
      
      try {
        const uploadRes = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_KEY, {
          method: 'POST',
          body: formData
        });
        
        const uploadData = await uploadRes.json();
        
        if (uploadData.success) {
          const taskType = document.getElementById('taskType').value;
          
          const params = new URLSearchParams({
            action: 'submit_task',
            phone: currentUser.phone,
            task_type: taskType,
            image_url: uploadData.data.url
          });
          
          const response = await fetch(API_URL + '?' + params);
          const data = await response.json();
          
          if (data.status === 'success') {
            showMessage('actionMessage', '✅ Task submitted! Wait for approval.', 'success');
            toggleTaskForm();
            fileInput.value = '';
          } else {
            showMessage('actionMessage', '❌ ' + data.message, 'error');
          }
        } else {
          showMessage('actionMessage', 'Image upload failed', 'error');
        }
      } catch (error) {
        showMessage('actionMessage', 'Upload failed. Try again.', 'error');
      }
    }
    
    function toggleRechargeForm() {
      const form = document.getElementById('rechargeForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
    
    async function submitRecharge() {
      const trxId = document.getElementById('rechargeTrxId').value.trim();
      
      if (!trxId) {
        alert('Please enter Transaction ID');
        return;
      }
      
      const params = new URLSearchParams({
        action: 'recharge',
        phone: currentUser.phone,
        trx_id: trxId
      });
      
      try {
        const response = await fetch(API_URL + '?' + params);
        const data = await response.json();
        
        if (data.status === 'success') {
          showMessage('actionMessage', '✅ Recharge submitted! Wait for verification.', 'success');
          toggleRechargeForm();
          document.getElementById('rechargeTrxId').value = '';
        } else {
          showMessage('actionMessage', '❌ ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('actionMessage', 'Connection error', 'error');
      }
    }
    
    function showMessage(elementId, text, type) {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.className = 'message ' + type;
      setTimeout(() => {
        el.className = 'message';
      }, 5000);
    }
    
    function logout() {
      localStorage.removeItem('capcup_user');
      location.reload();
    }
  </script>
</body>
        </html>
