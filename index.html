<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup - Get Your Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 30px;
    }
    .card-preview {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
    }
    .chip {
      width: 45px;
      height: 35px;
      background: linear-gradient(135deg, #ffd700, #d4af37);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      opacity: 0.8;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
    }
    input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .price-box {
      background: rgba(34,197,94,0.2);
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
    }
    .price {
      font-size: 28px;
      font-weight: bold;
      color: #22c55e;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.02);
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      opacity: 0.7;
    }
    .login-link a {
      color: #60a5fa;
      text-decoration: none;
    }
    .message {
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success {
      background: rgba(34,197,94,0.2);
      border: 1px solid #22c55e;
      display: block;
    }
    .message.error {
      background: rgba(239,68,68,0.2);
      border: 1px solid #ef4444;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CapCup</h1>
    <p class="subtitle">Your Virtual Service Card</p>
    
    <div class="card-preview">
      <div class="chip"></div>
      <div style="font-size: 22px; letter-spacing: 3px; margin: 15px 0;">•••• •••• •••• ••••</div>
      <div style="display: flex; justify-content: space-between; opacity: 0.7;">
        <span>CARDHOLDER</span>
        <span>VALID THRU</span>
      </div>
    </div>
    
    <div id="message" class="message"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>
      <div class="form-group">
        <label>bKash Transaction ID (Send 20 Taka to: 01XXXXXXXXX)</label>
        <input type="text" id="trx_id" placeholder="Enter bKash TrxID" required>
      </div>
      
      <div class="price-box">
        <div>One-Time Card Fee</div>
        <div class="price">৳20</div>
        <div style="font-size: 12px; opacity: 0.7;">+ 10 Taka monthly after activation</div>
      </div>
      
      <button type="submit" class="btn">Register & Pay 20 Taka</button>
    </form>
    
    <p class="login-link">
      Already have a card? <a href="dashboard.html">Login Here</a>
    </p>
  </div>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxbpjpkF5C1FadjXYLtVVz64YNDY2_zf2u1A5dCc-dLTgCLiIlkbbUXfpsvXkLiqHEV/exec';
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const messageEl = document.getElementById('message');
      messageEl.className = 'message';
      messageEl.textContent = 'Processing...';
      messageEl.style.display = 'block';
      
      const formData = {
        action: 'register',
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        trx_id: document.getElementById('trx_id').value
      };
      
      const params = new URLSearchParams(formData);
      
      try {
        const response = await fetch(API_URL + '?' + params.toString());
        const data = await response.json();
        
        if (data.status === 'success') {
          messageEl.className = 'message success';
          messageEl.innerHTML = `✅ Registration submitted!<br>Your Card Number: <strong>${data.card_number}</strong><br><br>Wait for admin approval (usually within 1 hour). Then <a href="dashboard.html" style="color:#60a5fa">login here</a>.`;
          document.getElementById('registerForm').reset();
        } else {
          messageEl.className = 'message error';
          messageEl.textContent = '❌ ' + data.message;
        }
      } catch (error) {
        messageEl.className = 'message error';
        messageEl.textContent = '❌ Connection error. Please try again.';
      }
    });
  </script>
</body>
  </html>
