<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
    body { background: #0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .admin-container { max-width:1400px; width:100%; background: #1e293b; border-radius:36px; padding:2rem; box-shadow:0 25px 40px #00000050; }
    h1 { color: white; font-weight:700; margin-bottom:20px; }
    .login-panel { background:#0f172a; padding:2rem; border-radius:24px; max-width:400px; margin:3rem auto; }
    .input-field { width:100%; padding:14px; background:#1e293b; border:1px solid #334155; border-radius:18px; color:white; margin:10px 0; }
    .btn { background:#3b82f6; color:white; padding:14px; border:none; border-radius:30px; font-weight:600; width:100%; cursor:pointer; }
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:30px; }
    .stat-card { background:#0f172a; padding:1.5rem; border-radius:24px; color:white; }
    .table-wrapper { background:#0f172a; border-radius:24px; padding:1rem; overflow-x:auto; margin:20px 0; }
    table { width:100%; border-collapse:collapse; color:#e2e8f0; }
    th { text-align:left; padding:12px; border-bottom:1px solid #334155; }
    td { padding:12px; border-bottom:1px solid #1e293b; }
    .badge { padding:4px 12px; border-radius:40px; font-size:0.8rem; }
    .approve-btn { background:#10b981; border:none; color:white; padding:6px 12px; border-radius:20px; margin-right:5px; cursor:pointer; }
    .decline-btn { background:#ef4444; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
<div class="admin-container">
  <div id="loginScreen">
    <div class="login-panel">
      <h2 style="color:white; margin-bottom:20px;">Admin Access</h2>
      <input type="password" id="adminPassInput" class="input-field" placeholder="Password">
      <button class="btn" id="adminLoginBtn">Login</button>
    </div>
  </div>
  
  <div id="adminDashboard" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>CapCup Admin</h1>
      <button id="logoutAdminBtn" style="background:#475569; padding:8px 24px; border-radius:30px;">Logout</button>
    </div>
    <div class="stats-grid" id="statsContainer"></div>
    
    <h3 style="color:white; margin:25px 0 10px;">⏳ Pending Registrations</h3>
    <div id="pendingRegs" class="table-wrapper"></div>
    
    <h3 style="color:white; margin:25px 0 10px;">💳 Pending Monthly Payments</h3>
    <div id="pendingPayments" class="table-wrapper"></div>
    
    <div style="display:flex; gap:15px; margin:20px 0;">
      <button id="refreshBtn" class="btn" style="width:auto; padding:12px 30px;">🔄 Refresh</button>
    </div>
    
    <h3 style="color:white;">👥 All Members</h3>
    <div id="membersTable" class="table-wrapper"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwYOUR_SCRIPT_ID_HERE/exec'; // SAME URL
  const ADMIN_PASSWORD = 'capcup123';
  
  let adminLogged = false;
  
  document.getElementById('adminLoginBtn').addEventListener('click', ()=>{
    const pass = document.getElementById('adminPassInput').value;
    if (pass === ADMIN_PASSWORD) {
      adminLogged = true;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      loadAdminData();
    } else alert('Wrong password');
  });
  
  document.getElementById('logoutAdminBtn').addEventListener('click', ()=>{
    adminLogged = false;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminDashboard').classList.add('hidden');
  });
  
  async function callAdmin(action, params={}) {
    if (!adminLogged) return;
    const formData = new FormData();
    formData.append('action', action);
    formData.append('adminPassword', ADMIN_PASSWORD);
    Object.keys(params).forEach(k=> formData.append(k, params[k]));
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
    return await res.json();
  }
  
  async function loadAdminData() {
    const data = await callAdmin('getAdminData');
    if (!data) return;
    // stats
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><h3>${data.total}</h3><p>Total Users</p></div>
      <div class="stat-card"><h3>${data.active}</h3><p>Active</p></div>
      <div class="stat-card"><h3>${data.pendingSignup}</h3><p>Pending Reg</p></div>
      <div class="stat-card"><h3>${data.expired}</h3><p>Expired</p></div>
    `;
    renderPendingRegs(data.pendingRegistrations);
    renderPendingPayments(data.pendingMonthly);
    renderMembers(data.allUsers);
  }
  
  function renderPendingRegs(users) {
    const html = `<table><tr><th>Name</th><th>Email</th><th>TrxID</th><th>Action</th></tr>
      ${users.map(u=> `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.signupTrx}</td>
        <td><button class="approve-btn" data-email="${u.email}" data-action="approveSignup">Approve</button>
        <button class="decline-btn" data-email="${u.email}" data-action="declineSignup">Decline</button></td></tr>`).join('')}</table>`;
    document.getElementById('pendingRegs').innerHTML = html;
  }
  function renderPendingPayments(payments) {
    const html = `<table><tr><th>Name</th><th>Email</th><th>TrxID</th><th>Action</th></tr>
      ${payments.map(p=> `<tr><td>${p.name}</td><td>${p.email}</td><td>${p.trxId}</td>
        <td><button class="approve-btn" data-email="${p.email}" data-action="approveMonthly">Approve</button>
        <button class="decline-btn" data-email="${p.email}" data-action="declineMonthly">Decline</button></td></tr>`).join('')}</table>`;
    document.getElementById('pendingPayments').innerHTML = html;
  }
  function renderMembers(users) {
    const html = `<table><tr><th>Status</th><th>Name</th><th>Email</th><th>Card No</th><th>Due Date</th><th>Months Paid</th><th>Action</th></tr>
      ${users.map(u=> `<tr><td><span class="badge" style="background:${u.activeStatus?'#10b981':'#ef4444'}">${u.activeStatus?'Active':'Expired'}</span></td>
        <td>${u.name}</td><td>${u.email}</td><td>${u.cardNumber}</td><td>${u.dueDate}</td><td>${u.monthsPaid}</td>
        <td><button class="approve-btn" data-email="${u.email}" data-action="forceExtend">+30d</button></td></tr>`).join('')}</table>`;
    document.getElementById('membersTable').innerHTML = html;
  }
  
  document.addEventListener('click', async (e) => {
    if (!adminLogged) return;
    const btn = e.target.closest('button');
    if (!btn) return;
    const action = btn.dataset.action;
    const email = btn.dataset.email;
    if (!action || !email) return;
    let resp;
    if (action === 'approveSignup') resp = await callAdmin('approveSignup', { email });
    else if (action === 'declineSignup') resp = await callAdmin('declineSignup', { email });
    else if (action === 'approveMonthly') resp = await callAdmin('approveMonthly', { email });
    else if (action === 'declineMonthly') resp = await callAdmin('declineMonthly', { email });
    else if (action === 'forceExtend') {
      const reason = prompt('Extend 30 days? (admin override)');
      if (reason) resp = await callAdmin('forceExtend', { email });
    }
    if (resp && resp.success) { alert('Done'); loadAdminData(); }
    else alert(resp?.message || 'Error');
  });
  
  document.getElementById('refreshBtn').addEventListener('click', loadAdminData);
</script>
</body>
</html>
