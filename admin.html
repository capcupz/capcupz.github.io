<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup Admin · Premium Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
      color: #f1f5f9;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    .admin-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .admin-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: adminOrbFloat 15s ease-in-out infinite alternate;
    }
    
    .admin-orb-1 {
      background: #3b82f6;
      top: -100px;
      right: -100px;
    }
    
    .admin-orb-2 {
      background: #8b5cf6;
      bottom: -100px;
      left: -100px;
      animation-delay: 5s;
    }
    
    @keyframes adminOrbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, -50px) scale(1.3); }
    }
    
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    
    /* Glassmorphism */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      animation: slideDown 0.8s ease-out;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .admin-logo {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes logoGlow {
      0% { filter: brightness(1); }
      100% { filter: brightness(1.3); }
    }
    
    .btn {
      padding: 0.9rem 2rem;
      border-radius: 50px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }
    
    .btn:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .btn span {
      position: relative;
      z-index: 1;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
    }
    
    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }
    
    /* Login */
    .login-container {
      max-width: 450px;
      margin: 120px auto;
      animation: fadeInUp 1s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .input-field {
      width: 100%;
      padding: 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      color: white;
      font-size: 1rem;
      margin: 1.2rem 0;
      transition: all 0.3s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }
    
    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    /* Dashboard Grid */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 2.5rem;
      animation: fadeInUp 1s ease-out 0.3s both;
    }
    
    .section-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .section-title {
      font-size: 1.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .count-badge {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 0.3rem 1rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
    }
    
    .request-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s;
      animation: itemFadeIn 0.5s ease-out;
    }
    
    @keyframes itemFadeIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .request-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(59, 130, 246, 0.3);
      transform: translateX(5px);
    }
    
    .request-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    
    .request-name {
      font-weight: 800;
      font-size: 1.1rem;
    }
    
    .request-email {
      opacity: 0.7;
      font-size: 0.9rem;
    }
    
    .request-detail {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      margin-bottom: 1.2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    
    .action-group {
      display: flex;
      gap: 1rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      opacity: 0.5;
      font-size: 1.1rem;
    }
    
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-bg">
    <div class="admin-orb admin-orb-1"></div>
    <div class="admin-orb admin-orb-2"></div>
  </div>

  <div class="container">
    <!-- Login Panel -->
    <div id="loginPanel">
      <div class="login-container">
        <div class="glass-panel">
          <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; font-weight: 800;">
            <span style="background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent;">🔐 Admin Access</span>
          </h2>
          <input type="password" id="adminPassword" class="input-field" placeholder="Enter admin password">
          <button class="btn btn-primary" style="width: 100%;" onclick="loginAdmin()">
            <span>Access Control Panel</span>
          </button>
          <p id="loginError" style="color: #ef4444; margin-top: 1.5rem; text-align: center;"></p>
          <p style="text-align: center; margin-top: 2.5rem;">
            <a href="index.html" style="color: #3b82f6; text-decoration: none; font-weight: 600;">← Back to Website</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" style="display: none;">
      <div class="admin-header">
        <div>
          <span class="admin-logo">CapCup Admin</span>
          <span style="margin-left: 1.5rem; opacity: 0.6; font-weight: 500;">Premium Control Panel</span>
        </div>
        <div style="display: flex; gap: 1.5rem;">
          <button class="btn btn-outline" onclick="refreshData()">
            <span>⟳ Refresh</span>
          </button>
          <button class="btn btn-danger" onclick="logoutAdmin()">
            <span>Logout</span>
          </button>
        </div>
      </div>

      <div class="admin-grid">
        <!-- Pending Registrations -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <span>⏳</span> Pending Registrations
            </div>
            <span class="count-badge" id="regCount">0</span>
          </div>
          <div id="pendingRegistrations"></div>
        </div>

        <!-- Pending Recharges -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <span>💳</span> Pending Recharges
            </div>
            <span class="count-badge" id="rechargeCount">0</span>
          </div>
          <div id="pendingRecharges"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGJ356zyjDyZmB6NqNBe5rnjStygfoCUVW6tQfK_CCLJob8zBBzzxAuY5V8U9Grw6SgQ/exec';
    const ADMIN_PASSWORD = 'capcup123';
    
    if(sessionStorage.getItem('adminLoggedIn') === 'true') {
      showDashboard();
    }

    function loginAdmin() {
      const password = document.getElementById('adminPassword').value;
      
      if(password === ADMIN_PASSWORD) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        showDashboard();
      } else {
        document.getElementById('loginError').innerText = '❌ Invalid password';
      }
    }

    function showDashboard() {
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('adminDashboard').style.display = 'block';
      refreshData();
    }

    function logoutAdmin() {
      sessionStorage.removeItem('adminLoggedIn');
      document.getElementById('loginPanel').style.display = 'block';
      document.getElementById('adminDashboard').style.display = 'none';
      document.getElementById('adminPassword').value = '';
    }

    async function callAppsScript(action, params = {}) {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...params })
        });
        
        if (response.ok) {
          const text = await response.text();
          try {
            return JSON.parse(text);
          } catch(e) {
            return { success: true };
          }
        }
        return { success: false };
      } catch (error) {
        console.error('API Error:', error);
        return { success: false };
      }
    }

    async function refreshData() {
      const res = await callAppsScript('adminGetPending');
      
      const regDiv = document.getElementById('pendingRegistrations');
      const regCount = document.getElementById('regCount');
      
      if(res.pendingReg && res.pendingReg.length > 0) {
        regCount.innerText = res.pendingReg.length;
        regDiv.innerHTML = res.pendingReg.map(user => `
          <div class="request-item">
            <div class="request-header">
              <span class="request-name">${user.name}</span>
              <span class="request-email">${user.email}</span>
            </div>
            <div class="request-detail">
              🔑 Transaction: ${user.trxId}
            </div>
            <div class="action-group">
              <button class="btn btn-success" onclick="approveUser('${user.email}')">
                <span>✓ Approve</span>
              </button>
              <button class="btn btn-danger" onclick="declineUser('${user.email}')">
                <span>✗ Decline</span>
              </button>
            </div>
          </div>
        `).join('');
      } else {
        regCount.innerText = '0';
        regDiv.innerHTML = '<div class="empty-state">✨ No pending registrations</div>';
      }
      
      const recDiv = document.getElementById('pendingRecharges');
      const recCount = document.getElementById('rechargeCount');
      
      if(res.pendingRec && res.pendingRec.length > 0) {
        recCount.innerText = res.pendingRec.length;
        recDiv.innerHTML = res.pendingRec.map(recharge => `
          <div class="request-item">
            <div class="request-header">
              <span class="request-name">${recharge.email}</span>
            </div>
            <div class="request-detail">
              💳 Transaction: ${recharge.trxId}
            </div>
            <div class="action-group">
              <button class="btn btn-success" onclick="approveRecharge('${recharge.trxId}')">
                <span>✓ Approve</span>
              </button>
              <button class="btn btn-danger" onclick="declineRecharge('${recharge.trxId}')">
                <span>✗ Decline</span>
              </button>
            </div>
          </div>
        `).join('');
      } else {
        recCount.innerText = '0';
        recDiv.innerHTML = '<div class="empty-state">✨ No pending recharges</div>';
      }
    }

    async function approveUser(email) {
      await callAppsScript('approveUser', { email });
      refreshData();
    }

    async function declineUser(email) {
      await callAppsScript('declineUser', { email });
      refreshData();
    }

    async function approveRecharge(trxId) {
      await callAppsScript('approveRecharge', { trxId });
      refreshData();
    }

    async function declineRecharge(trxId) {
      await callAppsScript('declineRecharge', { trxId });
      refreshData();
    }

    window.loginAdmin = loginAdmin;
    window.logoutAdmin = logoutAdmin;
    window.refreshData = refreshData;
    window.approveUser = approveUser;
    window.declineUser = declineUser;
    window.approveRecharge = approveRecharge;
    window.declineRecharge = declineRecharge;
  </script>
</body>
                                           </html>
