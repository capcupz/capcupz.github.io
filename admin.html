<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 24px 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a5f;
    }
    
    .logo span {
      color: #3b82f6;
    }
    
    .admin-badge {
      background: #1e3a5f;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    
    #loginBox {
      background: white;
      padding: 50px 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 450px;
      margin: 100px auto;
    }
    
    #loginBox h2 {
      color: #1e3a5f;
      margin-bottom: 30px;
    }
    
    #loginBox input {
      width: 100%;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 20px;
    }
    
    #loginBox button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1e3a5f, #2d5a8a);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    #panel {
      display: none;
    }
    
    .section {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    .section h2 {
      color: #1e3a5f;
      margin-bottom: 20px;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
    }
    
    .item-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    
    .item-name {
      font-weight: 700;
      color: #1e3a5f;
      font-size: 18px;
    }
    
    .item-detail {
      color: #64748b;
      margin-bottom: 8px;
    }
    
    .item-detail strong {
      color: #1e3a5f;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .btn-approve {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }
    
    .btn-approve:hover {
      background: #16a34a;
    }
    
    .task-image {
      max-width: 200px;
      border-radius: 10px;
      margin: 10px 0;
    }
    
    .empty-message {
      text-align: center;
      color: #64748b;
      padding: 30px;
    }
    
    .refresh-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }
    
    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginBox">
      <h2>🔐 Admin Access</h2>
      <input type="password" id="adminKey" placeholder="Enter Admin Key">
      <button onclick="login()">Access Panel</button>
    </div>
    
    <div id="panel">
      <div class="header">
        <div class="logo">Cap<span>Cup</span> Admin</div>
        <div style="display: flex; gap: 10px;">
          <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh</button>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      
      <div class="section">
        <h2>📋 Pending Registrations</h2>
        <div id="pendingUsers"></div>
      </div>
      
      <div class="section">
        <h2>💰 Pending Monthly Recharges</h2>
        <div id="pendingRecharges"></div>
      </div>
      
      <div class="section">
        <h2>📸 Pending Tasks</h2>
        <div id="pendingTasks"></div>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxbpjpkF5C1FadjXYLtVVz64YNDY2_zf2u1A5dCc-dLTgCLiIlkbbUXfpsvXkLiqHEV/exec';
    const ADMIN_KEY = 'capcup123';
    let key = '';
    
    // Check if already logged in
    const savedKey = localStorage.getItem('capcup_admin_key');
    if (savedKey === ADMIN_KEY) {
      key = savedKey;
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadAll();
    }
    
    function login() {
      const inputKey = document.getElementById('adminKey').value;
      if (inputKey === ADMIN_KEY) {
        key = inputKey;
        localStorage.setItem('capcup_admin_key', key);
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        loadAll();
      } else {
        alert('❌ Invalid Admin Key');
      }
    }
    
    function logout() {
      localStorage.removeItem('capcup_admin_key');
      location.reload();
    }
    
    function refreshAll() {
      loadPendingUsers();
      loadPendingRecharges();
      loadPendingTasks();
    }
    
    function loadAll() {
      loadPendingUsers();
      loadPendingRecharges();
      loadPendingTasks();
    }
    
    async function loadPendingUsers() {
      const params = new URLSearchParams({
        action: 'get_pending_users',
        admin_key: key
      });
      
      try {
        const res = await fetch(API_URL + '?' + params);
        const data = await res.json();
        
        const container = document.getElementById('pendingUsers');
        
        if (data.status === 'success' && data.pending && data.pending.length > 0) {
          container.innerHTML = data.pending.map(u => `
            <div class="item">
              <div class="item-header">
                <span class="item-name">${u.name}</span>
              </div>
              <div class="item-detail"><strong>Phone:</strong> ${u.phone}</div>
              <div class="item-detail"><strong>Email:</strong> ${u.email || 'N/A'}</div>
              <div class="item-detail"><strong>TrxID:</strong> ${u.trx_id}</div>
              <div class="btn-group">
                <button class="btn-approve" onclick="approvePayment(${u.row}, '${u.phone}')">✅ Approve & Give 25 Credits</button>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-message">✅ No pending registrations</div>';
        }
      } catch (error) {
        console.error(error);
      }
    }
    
    async function approvePayment(row, phone) {
      const params = new URLSearchParams({
        action: 'approve_payment',
        admin_key: key,
        row: row,
        phone: phone
      });
      
      try {
        const res = await fetch(API_URL + '?' + params);
        const data = await res.json();
        alert(data.message);
        loadPendingUsers();
      } catch (error) {
        alert('Error approving payment');
      }
    }
    
    async function loadPendingRecharges() {
      const params = new URLSearchParams({
        action: 'get_pending_recharges',
        admin_key: key
      });
      
      try {
        const res = await fetch(API_URL + '?' + params);
        const data = await res.json();
        
        const container = document.getElementById('pendingRecharges');
        
        if (data.status === 'success' && data.pending && data.pending.length > 0) {
          container.innerHTML = data.pending.map(r => `
            <div class="item">
              <div class="item-header">
                <span class="item-name">${r.name}</span>
              </div>
              <div class="item-detail"><strong>Phone:</strong> ${r.phone}</div>
              <div class="item-detail"><strong>TrxID:</strong> ${r.trx_id}</div>
              <div class="btn-group">
                <button class="btn-approve" onclick="approveRecharge(${r.row}, '${r.phone}')">✅ Approve Recharge (Extend 30 Days)</button>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-message">✅ No pending recharges</div>';
        }
      } catch (error) {
        console.error(error);
      }
    }
    
    async function approveRecharge(row, phone) {
      const params = new URLSearchParams({
        action: 'approve_recharge',
        admin_key: key,
        row: row,
        phone: phone
      });
      
      try {
        const res = await fetch(API_URL + '?' + params);
        const data = await res.json();
        alert(data.message);
        loadPendingRecharges();
      } catch (error) {
        alert('Error approving recharge');
      }
    }
    
    async function loadPendingTasks() {
      const params = new URLSearchParams({
        action: 'get_pending_tasks',
        admin_key: key
      });
      
      try {
        const res = await fetch(API_URL + '?' + params);
        const data = await res.json();
        
        const container = document.getElementById('pendingTasks');
        
        if (data.status === 'success' && data.pending && data.pending.length > 0) {
          container.innerHTML = data.pending.map(t => `
            <div class="item">
              <div class="item-header">
                <span class="item-name">${t.phone}</span>
              </div>
              <div class="item-detail"><strong>Task:</strong> ${t.task_type}</div>
              <img src="${t.image_url}" class="task-image" alt="Task Screenshot">
              <div class="btn-group">
                <button class="btn-approve" onclick="approveTask(${t.row}, '${t.phone}', 5)">✅ Approve (+5 Credits)</button>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-message">✅ No pending tasks</div>';
        }
      } catch (error) {
        console.error(error);
      }
    }
    
    async function approveTask(row, phone, credits) {
      const params = new URLSearchParams({
        action: 'approve_task',
        admin_key: key,
        task_row: row,
        phone: phone,
        credits: credits
      });
      
      try {
        const res = await fetch(API_URL + '?' + params);
        const data = await res.json();
        alert(data.message);
        loadPendingTasks();
      } catch (error) {
        alert('Error approving task');
      }
    }
  </script>
</body>
</html>
