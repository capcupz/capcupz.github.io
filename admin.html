<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapCup Admin · Premium Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    :root {
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
    }
    
    /* Admin Header */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
    }
    
    .admin-logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-success {
      background: var(--success);
      color: white;
    }
    
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
    
    /* Login Panel */
    .login-panel {
      max-width: 400px;
      margin: 100px auto;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .input-field {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      margin: 1rem 0;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.15);
    }
    
    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    /* Admin Cards */
    .admin-grid {
      display: grid;
      gap: 2rem;
    }
    
    .admin-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .admin-card h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .request-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .request-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    .request-detail {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .action-buttons {
      display: flex;
      gap: 1rem;
    }
    
    .refresh-btn {
      background: var(--primary);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-left: 1rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Login Panel -->
  <div id="loginPanel">
    <div class="login-panel">
      <h2 style="text-align: center; margin-bottom: 2rem;">🔐 Admin Access</h2>
      <input type="password" id="adminPassword" class="input-field" placeholder="Enter admin password">
      <button class="btn btn-primary" style="width: 100%;" onclick="loginAdmin()">Access Panel</button>
      <p id="loginError" style="color: var(--danger); margin-top: 1rem; text-align: center;"></p>
      <p style="text-align: center; margin-top: 2rem;">
        <a href="index.html" style="color: var(--primary); text-decoration: none;">← Back to Website</a>
      </p>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="adminDashboard" style="display: none;">
    <div class="admin-header">
      <div>
        <span class="admin-logo">CapCup Admin</span>
        <span style="margin-left: 1rem; font-size: 0.9rem; opacity: 0.7;">Premium Control Panel</span>
      </div>
      <div style="display: flex; gap: 1rem;">
        <button class="btn btn-outline" onclick="refreshData()">⟳ Refresh</button>
        <button class="btn btn-danger" onclick="logoutAdmin()">Logout</button>
      </div>
    </div>

    <div class="admin-grid">
      <!-- Pending Registrations -->
      <div class="admin-card">
        <h2>
          <span>⏳</span> Pending Registrations
          <span id="regCount" style="background: var(--primary); padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.9rem;"></span>
        </h2>
        <div id="pendingRegistrations"></div>
      </div>

      <!-- Pending Recharges -->
      <div class="admin-card">
        <h2>
          <span>💳</span> Pending Monthly Recharges
          <span id="rechargeCount" style="background: var(--warning); padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.9rem;"></span>
        </h2>
        <div id="pendingRecharges"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGJ356zyjDyZmB6NqNBe5rnjStygfoCUVW6tQfK_CCLJob8zBBzzxAuY5V8U9Grw6SgQ/exec';
  const ADMIN_PASSWORD = 'capcup123';
  
  let isAdminLoggedIn = false;

  // Check if already logged in
  if(sessionStorage.getItem('adminLoggedIn') === 'true') {
    showDashboard();
  }

  function loginAdmin() {
    const password = document.getElementById('adminPassword').value;
    
    if(password === ADMIN_PASSWORD) {
      isAdminLoggedIn = true;
      sessionStorage.setItem('adminLoggedIn', 'true');
      showDashboard();
    } else {
      document.getElementById('loginError').innerText = 'Invalid password';
    }
  }

  function showDashboard() {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    refreshData();
  }

  function logoutAdmin() {
    isAdminLoggedIn = false;
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('adminDashboard').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  async function callAppsScript(action, params = {}) {
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...params })
      });
      
      if (response.ok) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch(e) {
          return { success: true };
        }
      }
      return { success: false };
    } catch (error) {
      console.error('API Error:', error);
      return { success: false };
    }
  }

  async function refreshData() {
    const res = await callAppsScript('adminGetPending');
    
    // Update registrations
    const regDiv = document.getElementById('pendingRegistrations');
    const regCount = document.getElementById('regCount');
    
    if(res.pendingReg && res.pendingReg.length > 0) {
      regCount.innerText = res.pendingReg.length;
      regDiv.innerHTML = res.pendingReg.map(user => `
        <div class="request-item">
          <div class="request-header">
            <span class="request-title">${user.name}</span>
            <span style="opacity: 0.7;">${user.email}</span>
          </div>
          <div class="request-detail">
            Transaction ID: ${user.trxId}
          </div>
          <div class="action-buttons">
            <button class="btn btn-success" onclick="approveUser('${user.email}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="declineUser('${user.email}')">✗ Decline</button>
          </div>
        </div>
      `).join('');
    } else {
      regCount.innerText = '0';
      regDiv.innerHTML = '<div class="empty-state">No pending registrations</div>';
    }
    
    // Update recharges
    const recDiv = document.getElementById('pendingRecharges');
    const recCount = document.getElementById('rechargeCount');
    
    if(res.pendingRec && res.pendingRec.length > 0) {
      recCount.innerText = res.pendingRec.length;
      recDiv.innerHTML = res.pendingRec.map(recharge => `
        <div class="request-item">
          <div class="request-header">
            <span class="request-title">${recharge.email}</span>
          </div>
          <div class="request-detail">
            Transaction ID: ${recharge.trxId}
          </div>
          <div class="action-buttons">
            <button class="btn btn-success" onclick="approveRecharge('${recharge.trxId}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="declineRecharge('${recharge.trxId}')">✗ Decline</button>
          </div>
        </div>
      `).join('');
    } else {
      recCount.innerText = '0';
      recDiv.innerHTML = '<div class="empty-state">No pending recharges</div>';
    }
  }

  async function approveUser(email) {
    await callAppsScript('approveUser', { email });
    refreshData();
  }

  async function declineUser(email) {
    await callAppsScript('declineUser', { email });
    refreshData();
  }

  async function approveRecharge(trxId) {
    await callAppsScript('approveRecharge', { trxId });
    refreshData();
  }

  async function declineRecharge(trxId) {
    await callAppsScript('declineRecharge', { trxId });
    refreshData();
  }

  // Expose functions
  window.loginAdmin = loginAdmin;
  window.logoutAdmin = logoutAdmin;
  window.refreshData = refreshData;
  window.approveUser = approveUser;
  window.declineUser = declineUser;
  window.approveRecharge = approveRecharge;
  window.declineRecharge = declineRecharge;
</script>
</body>
</html>
