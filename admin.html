<!DOCTYPE html>
<html>
<head>
  <title>CapCup Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    input, button { padding: 12px; margin: 5px; border-radius: 8px; border: none; }
    button { background: #3b82f6; color: white; cursor: pointer; }
    .section { background: #1e293b; padding: 20px; border-radius: 16px; margin: 20px 0; }
    .item { background: #0f172a; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .btn-approve { background: #22c55e; }
    .btn-reject { background: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CapCup Admin Panel</h1>
    
    <div id="loginBox">
      <input type="password" id="adminKey" placeholder="Admin Key">
      <button onclick="login()">Access Panel</button>
    </div>
    
    <div id="panel" style="display:none;">
      <div class="section">
        <h2>Pending Registrations</h2>
        <div id="pendingUsers"></div>
      </div>
      
      <div class="section">
        <h2>Pending Tasks</h2>
        <div id="pendingTasks"></div>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxbpjpkF5C1FadjXYLtVVz64YNDY2_zf2u1A5dCc-dLTgCLiIlkbbUXfpsvXkLiqHEV/exec';
    const ADMIN_KEY = 'capcup123';
    let key = '';
    
    function login() {
      key = document.getElementById('adminKey').value;
      if (key === ADMIN_KEY) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        loadPendingUsers();
        loadPendingTasks();
      } else {
        alert('Wrong key');
      }
    }
    
    async function loadPendingUsers() {
      const params = new URLSearchParams({
        action: 'get_pending_users',
        admin_key: key
      });
      
      const res = await fetch(API_URL + '?' + params);
      const data = await res.json();
      
      const container = document.getElementById('pendingUsers');
      if (data.pending && data.pending.length > 0) {
        container.innerHTML = data.pending.map(u => `
          <div class="item">
            <strong>${u.name}</strong><br>
            Phone: ${u.phone}<br>
            TrxID: ${u.trx_id}<br>
            <button class="btn-approve" onclick="approvePayment(${u.row}, '${u.phone}')">Approve & Give 25 Credits</button>
          </div>
        `).join('');
      } else {
        container.innerHTML = '<p>No pending registrations</p>';
      }
    }
    
    async function approvePayment(row, phone) {
      const params = new URLSearchParams({
        action: 'approve_payment',
        admin_key: key,
        row: row,
        phone: phone
      });
      
      const res = await fetch(API_URL + '?' + params);
      const data = await res.json();
      alert(data.message);
      loadPendingUsers();
    }
    
    async function loadPendingTasks() {
      const params = new URLSearchParams({
        action: 'get_pending_tasks',
        admin_key: key
      });
      
      const res = await fetch(API_URL + '?' + params);
      const data = await res.json();
      
      const container = document.getElementById('pendingTasks');
      if (data.pending && data.pending.length > 0) {
        container.innerHTML = data.pending.map(t => `
          <div class="item">
            <strong>${t.phone}</strong> - ${t.task_type}<br>
            <img src="${t.image_url}" style="max-width:200px; margin:10px 0;"><br>
            <button class="btn-approve" onclick="approveTask(${t.row}, '${t.phone}', 5)">Approve (+5 Credits)</button>
          </div>
        `).join('');
      } else {
        container.innerHTML = '<p>No pending tasks</p>';
      }
    }
    
    async function approveTask(row, phone, credits) {
      const params = new URLSearchParams({
        action: 'approve_task',
        admin_key: key,
        task_row: row,
        phone: phone,
        credits: credits
      });
      
      const res = await fetch(API_URL + '?' + params);
      const data = await res.json();
      alert(data.message);
      loadPendingTasks();
    }
  </script>
</body>
</html>
